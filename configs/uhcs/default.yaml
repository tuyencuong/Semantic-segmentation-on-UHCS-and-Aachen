# Default config for UHCS dataset (legacy 4-class checkpoint-compatible setup).
# Override paths/splits from CLI or a custom YAML when needed.

img_folder: images
label_folder: labels

n_classes: 4
batch_size: 4
n_epochs: 100

train_size: [512, 512]
eval_size: [512, 512]
use_random_crop: true

mean: [0.485, 0.456, 0.406]
std: [0.229, 0.224, 0.225]
augmentations:
  HorizontalFlip: {p: 0.5}
  VerticalFlip: {p: 0.5}
  RandomRotate90: {p: 0.5}

train_repeat: 1
pin_memory: true
drop_last: true
train_num_workers: 4
eval_num_workers: 2

loss_type: CE
ignore_index: -1
label_mode: raw
label_extensions: [".npy", ".tif", ".tiff", ".png"]

model_variant: uhcs_legacy
save_every: 20

optimizer:
  type: AdamW
  encoder_lr: 1.0e-4
  decoder_lr: 1.0e-4
  weight_decay: 1.0e-5

lr_scheduler:
  type: MultiStepLR
  params:
    milestones: [60, 90]
    gamma: 0.1

split_info:
  type: TextSplit
  train_split_file: train.txt
  val_split_file: val.txt
  test_type: validation
  test_split_file: test.txt
